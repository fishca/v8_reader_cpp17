name: C++ CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  VCPKG_ROOT: C:\vcpkg

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update vcpkg
        run: |
          cd C:\vcpkg
          git fetch --depth=1 origin master
          git checkout master
          .\bootstrap-vcpkg.bat

      - name: Install dependencies via vcpkg
        run: vcpkg install --triplet=x64-windows --no-print-usage

      # ✅ install-qt-action удалён — Qt ставится через vcpkg

      - name: Clean build directory
        run: |
          if (Test-Path build) {
            Remove-Item -Path build -Recurse -Force
          }

      - name: Configure CMake
        run: >
          cmake -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          # 👇 CMake будет искать Qt в папке vcpkg/installed/x64-windows
          -DCMAKE_PREFIX_PATH=${{ env.VCPKG_ROOT }}/installed/x64-windows
          -DV8READER_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --parallel

      - name: Run Tests
        working-directory: build
        run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure

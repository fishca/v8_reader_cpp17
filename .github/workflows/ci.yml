name: C++ CI

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ✅ Используем install-qt-action для быстрой установки Qt (2-3 мин вместо 15 мин через vcpkg)
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      # ✅ Кэширование vcpkg для других зависимостей (если нужны)
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:\\vcpkg\\installed
            C:\\vcpkg\\downloads
          key: vcpkg-win-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-win-

      - name: Setup vcpkg
        run: |
          # Устанавливаем VCPKG_ROOT если не установлен
          if (-not $env:VCPKG_ROOT) {
            $env:VCPKG_ROOT = "C:\vcpkg"
            echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          }
          
          # Клонируем vcpkg если не существует
          if (-not (Test-Path $env:VCPKG_ROOT)) {
            git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
            & $env:VCPKG_ROOT\bootstrap-vcpkg.bat
          }
          
          # Интегрируем vcpkg
          & $env:VCPKG_ROOT\vcpkg integrate install

      - name: Install other dependencies via vcpkg
        run: |
          # Устанавливаем zlib через vcpkg
          vcpkg install zlib:x64-windows
          if (Test-Path vcpkg.json) {
            vcpkg install --triplet=x64-windows
          }
          # Выводим путь к установленному zlib для отладки
          Write-Host "ZLIB installed at: $env:VCPKG_ROOT\installed\x64-windows"
          Write-Host "VCPKG_ROOT is: $env:VCPKG_ROOT"

      - name: Clean build directory
        run: Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue; if (Test-Path build) { Remove-Item -Recurse -Force build }

      - name: Configure CMake
        run: >
          cmake -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
          "-DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
          -DV8READER_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run Tests
        working-directory: build
        run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure

      - name: Deploy Qt dependencies (Windows)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          # Копируем исполняемый файл во временную папку для деплоя
          mkdir -p deploy_windows
          Copy-Item build/src/app/Release/v8_reader.exe deploy_windows/
          
          # Запускаем windeployqt для копирования всех зависимостей Qt
          $qtBinPath = "$env:Qt6_DIR/bin"
          & "$qtBinPath/windeployqt.exe" --release --no-compiler-runtime --no-translations deploy_windows/v8_reader.exe
          
          # Копируем дополнительные DLL из vcpkg (zlib и другие)
          if (Test-Path "$env:VCPKG_ROOT/installed/x64-windows/bin/zlib1.dll") {
            Copy-Item "$env:VCPKG_ROOT/installed/x64-windows/bin/zlib1.dll" deploy_windows/
          }
          
          # Копируем MSVC runtime redistributable
          $vcRedistDir = "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Redist/MSVC"
          if (Test-Path $vcRedistDir) {
            $latestVersion = Get-ChildItem $vcRedistDir | Sort-Object Name -Descending | Select-Object -First 1
            $x64Path = "$vcRedistDir/$($latestVersion.Name)/x64"
            if (Test-Path $x64Path) {
              Get-ChildItem $x64Path -Filter "*.dll" | Copy-Item -Destination deploy_windows/
            }
          }

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/develop')
        with:
          name: v8_reader-windows-${{ github.run_number }}
          path: |
            build/src/app/Release/v8_reader.exe
            build/src/core/Release/v8reader_core.lib
            build/src/ui/Release/v8reader_ui.lib
          retention-days: 30

      - name: Upload Windows Release Artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          name: v8_reader-windows-release-${{ github.run_number }}
          path: deploy_windows/
          retention-days: 30

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # ✅ Используем предустановленные пакеты Ubuntu + install-qt-action
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libgl1-mesa-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libfontconfig1 \
            libfreetype6 \
            libdbus-1-3 \
            libgtest-dev \
            libgmock-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          cache: true

      # ✅ Кэширование сборки
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            build
            ~/.cache/vcpkg
          key: build-linux-${{ github.sha }}
          restore-keys: |
            build-linux-

      - name: Clean build directory
        run: rm -rf build || true

      - name: Configure CMake
        run: >
          cmake -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
          -DV8READER_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run Tests
        working-directory: build
        run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure

      - name: Deploy Qt dependencies (Linux)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          # Создаем папку для деплоя
          mkdir -p deploy_linux/bin deploy_linux/lib
          
          # Копируем исполняемый файл
          cp build/src/app/v8_reader deploy_linux/bin/
          
          # Используем linuxdeployqt для сбора зависимостей
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-x86_64.AppImage
          chmod +x linuxdeployqt-x86_64.AppImage
          
          # Запускаем linuxdeployqt
          ./linuxdeployqt-x86_64.AppImage deploy_linux/bin/v8_reader -appimage -verbose=2 || true
          
          # Если linuxdeployqt не сработал, копируем библиотеки вручную
          if [ ! -d "deploy_linux/lib" ] || [ -z "$(ls -A deploy_linux/lib 2>/dev/null)" ]; then
            # Копируем основные библиотеки Qt
            cp $Qt6_DIR/lib/libQt6Core.so* deploy_linux/lib/ 2>/dev/null || true
            cp $Qt6_DIR/lib/libQt6Gui.so* deploy_linux/lib/ 2>/dev/null || true
            cp $Qt6_DIR/lib/libQt6Widgets.so* deploy_linux/lib/ 2>/dev/null || true
            cp $Qt6_DIR/lib/libQt6DBus.so* deploy_linux/lib/ 2>/dev/null || true
            
            # Копируем плагины платформ
            mkdir -p deploy_linux/plugins/platforms
            cp -r $Qt6_DIR/plugins/platforms/libqxcb.so deploy_linux/plugins/platforms/ 2>/dev/null || true
            cp -r $Qt6_DIR/plugins/platforms/libqlinuxfb.so deploy_linux/plugins/platforms/ 2>/dev/null || true
            cp -r $Qt6_DIR/plugins/platforms/libqoffscreen.so deploy_linux/plugins/platforms/ 2>/dev/null || true
            
            # Копируем плагины изображений
            mkdir -p deploy_linux/plugins/imageformats
            cp -r $Qt6_DIR/plugins/imageformats/*.so deploy_linux/plugins/imageformats/ 2>/dev/null || true
            
            # Копируем ICU библиотеки
            cp $Qt6_DIR/lib/libicui18n.so* deploy_linux/lib/ 2>/dev/null || true
            cp $Qt6_DIR/lib/libicuuc.so* deploy_linux/lib/ 2>/dev/null || true
            cp $Qt6_DIR/lib/libicudata.so* deploy_linux/lib/ 2>/dev/null || true
          fi
          
          # Создаем скрипт запуска
          cat > deploy_linux/run.sh << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="$DIR/lib:$LD_LIBRARY_PATH"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$DIR/plugins/platforms"
          exec "$DIR/bin/v8_reader" "$@"
          EOF
          chmod +x deploy_linux/run.sh

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/develop')
        with:
          name: v8_reader-linux-${{ github.run_number }}
          path: |
            build/src/app/v8_reader
            build/src/core/libv8reader_core.a
            build/src/ui/libv8reader_ui.a
          retention-days: 30

      - name: Upload Linux Release Artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          name: v8_reader-linux-release-${{ github.run_number }}
          path: deploy_linux/
          retention-days: 30

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows Release Artifact
        uses: actions/download-artifact@v4
        with:
          name: v8_reader-windows-release-${{ github.run_number }}
          path: ./artifacts/windows

      - name: Download Linux Release Artifact
        uses: actions/download-artifact@v4
        with:
          name: v8_reader-linux-release-${{ github.run_number }}
          path: ./artifacts/linux

      - name: Create Release Archive
        run: |
          mkdir -p release_assets
          cd artifacts/windows && zip -r ../../release_assets/v8_reader-windows.zip .
          cd ../linux && zip -r ../../release_assets/v8_reader-linux.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

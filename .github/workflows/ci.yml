name: C++ CI

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ✅ Используем install-qt-action для быстрой установки Qt (2-3 мин вместо 15 мин через vcpkg)
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      # ✅ Кэширование vcpkg для других зависимостей (если нужны)
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:\\vcpkg\\installed
            C:\\vcpkg\\downloads
          key: vcpkg-win-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-win-

      - name: Setup vcpkg
        run: |
          # Устанавливаем VCPKG_ROOT если не установлен
          if (-not $env:VCPKG_ROOT) {
            $env:VCPKG_ROOT = "C:\vcpkg"
            echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          }
          
          # Клонируем vcpkg если не существует
          if (-not (Test-Path $env:VCPKG_ROOT)) {
            git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
            & $env:VCPKG_ROOT\bootstrap-vcpkg.bat
          }
          
          # Интегрируем vcpkg
          & $env:VCPKG_ROOT\vcpkg integrate install

      - name: Install other dependencies via vcpkg
        run: |
          # Устанавливаем zlib через vcpkg
          vcpkg install zlib:x64-windows
          if (Test-Path vcpkg.json) {
            vcpkg install --triplet=x64-windows
          }
          # Выводим путь к установленному zlib для отладки
          Write-Host "ZLIB installed at: $env:VCPKG_ROOT\installed\x64-windows"
          Write-Host "VCPKG_ROOT is: $env:VCPKG_ROOT"

      - name: Clean build directory
        run: Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue; if (Test-Path build) { Remove-Item -Recurse -Force build }

      - name: Configure CMake
        run: >
          cmake -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DV8READER_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --parallel

      - name: Run Tests
        working-directory: build
        run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/develop')
        with:
          name: v8_reader-windows-${{ github.run_number }}
          path: |
            build/src/app/Release/v8_reader.exe
            build/src/core/Release/v8reader_core.lib
            build/src/ui/Release/v8reader_ui.lib
          retention-days: 30

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # ✅ Используем предустановленные пакеты Ubuntu + install-qt-action
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libgl1-mesa-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libfontconfig1 \
            libfreetype6 \
            libdbus-1-3 \
            libgtest-dev \
            libgmock-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          cache: true

      # ✅ Кэширование сборки
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            build
            ~/.cache/vcpkg
          key: build-linux-${{ github.sha }}
          restore-keys: |
            build-linux-

      - name: Clean build directory
        run: rm -rf build || true

      - name: Configure CMake
        run: >
          cmake -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
          -DV8READER_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --parallel

      - name: Run Tests
        working-directory: build
        run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/develop')
        with:
          name: v8_reader-linux-${{ github.run_number }}
          path: |
            build/src/app/v8_reader
            build/src/core/libv8reader_core.a
            build/src/ui/libv8reader_ui.a
          retention-days: 30

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/develop')
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: v8_reader-windows-${{ github.run_number }}
          path: ./artifacts/windows

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: v8_reader-linux-${{ github.run_number }}
          path: ./artifacts/linux

      - name: Create Release Archive
        run: |
          mkdir -p release_assets
          cd artifacts/windows && zip -r ../../release_assets/v8_reader-windows.zip .
          cd ../linux && zip -r ../../release_assets/v8_reader-linux.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev-build-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Development Build #{0}', github.run_number) }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

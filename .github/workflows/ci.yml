name: C++ CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  # GitHub runners уже имеют vcpkg в этой папке
  VCPKG_ROOT: C:\vcpkg

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Синхронизируем предустановленный vcpkg
      - name: Update vcpkg
        run: |
          cd C:\vcpkg
          git pull
          .\bootstrap-vcpkg.bat

      # Устанавливаем зависимости (тихо, без спама в логах)
      - name: Install dependencies via vcpkg
        run: vcpkg install qt6-base qt6-tools zlib --triplet=x64-windows --no-print-usage

      # Устанавливаем Qt
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          cache: true
          arch: 'win64_msvc2022_64'

      # Конфигурация CMake
      - name: Configure CMake
        run: >
          cmake -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}

      # Сборка
      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --parallel

      # Тесты
      - name: Run Tests
        working-directory: build
        run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure